<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>KaTeX Direct Test</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .test-box { margin: 20px 0; padding: 15px; background: #f5f5f5; }
    h3 { color: #333; }
    .result { margin: 10px 0; }
  </style>
</head>
<body>
  <h1>KaTeX 换行命令测试</h1>

  <div class="test-box">
    <h3>Test 1: \cr 命令 (KaTeX专用)</h3>
    <p>源码: <code>\begin{aligned} a &= b \cr c &= d \end{aligned}</code></p>
    <div id="test1" class="result"></div>
  </div>

  <div class="test-box">
    <h3>Test 2: \\ 命令 (标准LaTeX)</h3>
    <p>源码: <code>\begin{aligned} a &= b \\ c &= d \end{aligned}</code></p>
    <div id="test2" class="result"></div>
  </div>

  <div class="test-box">
    <h3>Test 3: \newline 命令</h3>
    <p>源码: <code>\begin{aligned} a &= b \newline c &= d \end{aligned}</code></p>
    <div id="test3" class="result"></div>
  </div>

  <div class="test-box">
    <h3>Test 4: PID公式用 \cr</h3>
    <div id="test4" class="result"></div>
  </div>

  <div class="test-box">
    <h3>Test 5: PID公式用 \\</h3>
    <div id="test5" class="result"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script>
    // Test 1: \cr
    try {
      katex.render("\\begin{aligned} a &= b \\cr c &= d \\end{aligned}", document.getElementById('test1'), {displayMode: true, throwOnError: true});
      document.getElementById('test1').innerHTML += '<span style="color:green">✓ 成功</span>';
    } catch(e) {
      document.getElementById('test1').innerHTML = '<span style="color:red">✗ 错误: ' + e.message + '</span>';
    }

    // Test 2: \\
    try {
      katex.render("\\begin{aligned} a &= b \\\\ c &= d \\end{aligned}", document.getElementById('test2'), {displayMode: true, throwOnError: true});
      document.getElementById('test2').innerHTML += '<span style="color:green">✓ 成功</span>';
    } catch(e) {
      document.getElementById('test2').innerHTML = '<span style="color:red">✗ 错误: ' + e.message + '</span>';
    }

    // Test 3: \newline
    try {
      katex.render("\\begin{aligned} a &= b \\newline c &= d \\end{aligned}", document.getElementById('test3'), {displayMode: true, throwOnError: true});
      document.getElementById('test3').innerHTML += '<span style="color:green">✓ 成功</span>';
    } catch(e) {
      document.getElementById('test3').innerHTML = '<span style="color:red">✗ 错误: ' + e.message + '</span>';
    }

    // Test 4: PID with \cr
    try {
      katex.render("\\begin{aligned} u(t) &= K_p \\cdot e(t) \\cr &\\quad + K_i \\cdot \\int_0^t e(\\tau) d\\tau \\cr &\\quad + K_d \\cdot \\frac{de(t)}{dt} \\end{aligned}", document.getElementById('test4'), {displayMode: true, throwOnError: true});
      document.getElementById('test4').innerHTML += '<span style="color:green">✓ 成功 - 多行显示</span>';
    } catch(e) {
      document.getElementById('test4').innerHTML = '<span style="color:red">✗ 错误: ' + e.message + '</span>';
    }

    // Test 5: PID with \\
    try {
      katex.render("\\begin{aligned} u(t) &= K_p \\cdot e(t) \\\\ &\\quad + K_i \\cdot \\int_0^t e(\\tau) d\\tau \\\\ &\\quad + K_d \\cdot \\frac{de(t)}{dt} \\end{aligned}", document.getElementById('test5'), {displayMode: true, throwOnError: true});
      document.getElementById('test5').innerHTML += '<span style="color:green">✓ 成功 - 多行显示</span>';
    } catch(e) {
      document.getElementById('test5').innerHTML = '<span style="color:red">✗ 错误: ' + e.message + '</span>';
    }
  </script>
</body>
</html>
